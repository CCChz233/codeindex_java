# Nginx：公网 TLS 终止，反向代理到内网 Streamable HTTP MCP。
# 用法：复制到 /etc/nginx/conf.d/ 或 include，替换 server_name、证书路径、upstream 地址。
# 文档：docs/deploy_public_mcp_edge_proxy.md

upstream hybrid_mcp_backend {
    # 内网 MCP：与 HYBRID_MCP_HOST / HYBRID_MCP_PORT 一致；多库可定义多个 upstream + 多个 location
    server 127.0.0.1:8765;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name codeindex.example.com;

    ssl_certificate     /etc/ssl/certs/codeindex.example.com.fullchain.pem;
    ssl_certificate_key /etc/ssl/private/codeindex.example.com.key;

    # 单库：对外路径与 HYBRID_MCP_PATH 一致（默认 /mcp）
    location /mcp {
        proxy_pass http://hybrid_mcp_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 与 keepalive 配合：清空 Connection，由 Nginx 管理
        proxy_set_header Connection "";

        # Streamable / SSE / 长响应：避免缓冲与过短超时
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 60s;

        # Authorization: Bearer 原样转发（勿在此 strip）

        # 若将来使用 WebSocket 升级，取消注释并按需调整 map
        # proxy_set_header Upgrade $http_upgrade;
        # proxy_set_header Connection "upgrade";
    }
}

